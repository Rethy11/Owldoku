<!--
  Owldoku — happy owl sprite (used for the win overlay).

  Fully self-contained: all gradients and filters this sprite needs are
  defined right here in its own <defs>. It does not rely on anything from
  the page that embeds it, so it can be swapped for a different file
  without checking what else that might affect.
-->
<svg viewBox="-4 -4 108 108" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="owlBodyGrad" cx="38%" cy="26%" r="78%">
      <stop offset="0%" stop-color="#fbe3ac"/>
      <stop offset="45%" stop-color="#eeb15c"/>
      <stop offset="100%" stop-color="#c97a2e"/>
    </radialGradient>
    <radialGradient id="owlFaceGrad" cx="50%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="60%" stop-color="#f7d693"/>
      <stop offset="100%" stop-color="#eab55c"/>
    </radialGradient>
    <linearGradient id="owlWingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9973f"/>
      <stop offset="100%" stop-color="#a8641f"/>
    </linearGradient>
    <linearGradient id="owlTuftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c68b3c"/>
      <stop offset="100%" stop-color="#8a5a22"/>
    </linearGradient>
    <linearGradient id="owlBeakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6c877"/>
      <stop offset="100%" stop-color="#d17a3b"/>
    </linearGradient>
    <filter id="owlSoftShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>
  <ellipse cx="50" cy="93" rx="24" ry="4.5" fill="#000" opacity="0.28" filter="url(#owlSoftShadow)"/>
  <ellipse cx="50" cy="52" rx="33" ry="38" fill="url(#owlBodyGrad)" stroke="#5c3a17" stroke-width="1.1"/>
  <path d="M27,54 C16,50 6,42 3,26 C2,20 4,16 8,20 C13,28 18,37 24,44 C26,48 27,51 27,54 Z" fill="url(#owlWingGrad)" stroke="#5c3a17" stroke-width="1"/>
  <path d="M21,40 Q14,30 9,20" stroke="#5c3a17" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
