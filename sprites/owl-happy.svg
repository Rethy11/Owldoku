  <path d="M79,40 Q86,30 91,20" stroke="#5c3a17" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M84,34 Q90,26 94,18" stroke="#5c3a17" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M14,24 C11,14 14,3 21,7 C25,12 23,20 20,27 Z" fill="url(#owlTuftGrad)" stroke="#4a2f14" stroke-width="0.8"/>
  <path d="M27,22 C25,13 28,5 34,10 C37,15 35,21 31,26 Z" fill="url(#owlTuftGrad)" stroke="#4a2f14" stroke-width="0.8"/>
  <path d="M86,24 C89,14 86,3 79,7 C75,12 77,20 80,27 Z" fill="url(#owlTuftGrad)" stroke="#4a2f14" stroke-width="0.8"/>
